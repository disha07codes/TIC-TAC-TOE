<!DOCTYPE html>
<html>
<head>
    <title>Ultimate Drama Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>💅 Ultimate Drama Tic Tac Toe 💅</h1>

    <div class="controls">
        <button id="modeToggle">Mode: AI 🤖</button>
    </div>

    <div class="scoreboard">
        <div>Player X 👑: <span id="scoreX">0</span></div>
        <div>Player O 💖: <span id="scoreO">0</span></div>
    </div>

    <div id="status">Player X's turn 👑</div>

    <div class="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <button id="restart">Reset Round 🔄</button>

    <!-- Win Popup -->
    <div id="popup" class="popup hidden">
        <div class="popup-content">
            <h2 id="popupText"></h2>
            <button onclick="closePopup()">Continue ✨</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
